<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosiologi Scanner — Layar Utama</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;800&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #e8dbce; /* Warna papan kayu terang */
  --yellow: #FFD93D; --orange: #FF6B35; --green: #06D6A0;
  --text: #1a1a2e; --muted: #7777aa; --white: #ffffff;
}
body {
  background-color: var(--bg);
  background-image: radial-gradient(#cba477 1px, transparent 1px); /* Motif papan corkboard */
  background-size: 20px 20px; color: var(--text); font-family: 'Nunito Sans', sans-serif;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 3px solid rgba(26,26,46,0.1);
  background: rgba(255,255,255,0.9); z-index: 10;
}
.header-logo {
  background: var(--orange); border: 2px solid var(--text); border-radius: 12px;
  padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900;
  color: white; box-shadow: 2px 2px 0 var(--text);
}
.header-title { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; }

.main { flex: 1; display: flex; position: relative; overflow: hidden; padding-bottom: 50px; }
.sticky-stage { flex: 1; position: relative; padding: 20px; }

/* STICKY NOTES STYLE */
.sticky-note {
  position: absolute;
  width: 220px;
  min-height: 200px;
  padding: 20px;
  background: #fbf579; /* Warna khas sticky note */
  box-shadow: 3px 5px 10px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  border-bottom-right-radius: 20px 5px; /* Efek melengkung */
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { 0% { transform: scale(0) rotate(0); opacity: 0; } }

.sn-pin {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 15px; height: 15px; border-radius: 50%; background: #e74c3c;
  box-shadow: -1px -1px 3px rgba(0,0,0,0.2) inset, 2px 3px 5px rgba(0,0,0,0.2);
}
.sn-cat { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 900; color: #555; margin-top: 5px; text-transform: uppercase; border-bottom: 1px dashed #aaa; padding-bottom: 5px;}
.sn-title { font-family: 'Kalam', cursive; font-size: 22px; font-weight: 700; color: #111; flex: 1; margin: 10px 0; line-height: 1.2; }
.sn-footer { display: flex; justify-content: space-between; align-items: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; }
.sn-sifat { padding: 2px 8px; border-radius: 5px; color: white; }
.sn-sifat.positif { background: var(--green); color: var(--text); border: 1px solid var(--text); }
.sn-sifat.negatif { background: var(--orange); border: 1px solid var(--text); }

.sidebar {
  width: 280px; border-left: 3px solid rgba(26,26,46,0.1); padding: 20px 16px;
  background: rgba(255,255,255,0.85); z-index: 5; display: flex; flex-direction: column;
}
.sidebar-title { font-family: 'Nunito', sans-serif; font-weight: 900; margin-bottom: 12px; }

/* NEWS TICKER */
.ticker-wrap {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
  background: var(--text); color: white; display: flex; align-items: center;
  overflow: hidden; border-top: 3px solid var(--yellow); z-index: 20;
}
.ticker-label {
  background: var(--orange); height: 100%; padding: 0 20px;
  display: flex; align-items: center; font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 16px; z-index: 2; border-right: 3px solid white;
}
.ticker-content { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
@keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
.news-item { margin-right: 60px; font-size: 18px; font-weight: 700; display: inline-flex; align-items: center; gap: 12px; }
.news-tag { background: var(--yellow); color: var(--text); padding: 2px 8px; border-radius: 8px; font-size: 14px; font-weight: 900; }

.group-indicators { margin-top: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.group-chip {
  text-align: center; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 900;
  padding: 8px; border-radius: 8px; border: 2px solid rgba(0,0,0,0.1); color: var(--muted);
}
.group-chip.active { background: var(--green); color: var(--text); border-color: var(--text); }

.top-controls { position: fixed; top: 80px; left: 16px; display: flex; gap: 10px; z-index: 100; }
.control-btn { font-size: 12px; padding: 6px 12px; cursor: pointer; border: 2px solid var(--text); border-radius: 8px; font-weight: 900; background: white; transition: 0.2s;}
.control-btn:hover { background: var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🔬 Sos-Scanner</div>
  <div class="header-title">Peta Gejala Sosial Kelas (Fase E)</div>
</div>

<div class="top-controls">
  <button class="control-btn" onclick="toggleFullScreen()">🖵 Fullscreen</button>
  <button class="control-btn" onclick="resetAll()">🔄 Reset Data</button>
</div>

<div class="main">
  <div class="sticky-stage" id="sticky-stage"></div>
  <div class="sidebar">
    <div class="sidebar-title">🏅 Kesiapan Kelompok</div>
    <div class="group-indicators" id="group-indicators">
      <div class="group-chip" id="gd-1">Kel. 1</div>
      <div class="group-chip" id="gd-2">Kel. 2</div>
      <div class="group-chip" id="gd-3">Kel. 3</div>
    </div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">🔴 LIVE REPORT</div>
  <div class="ticker-content" id="ticker-content">
    <div class="news-item" style="color: var(--yellow);">Menunggu kelompok mengirim hasil analisis observasi digital...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, onChildAdded, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAmeoRLm2qq48uSv9CbML7RB5abKakn73I",
  authDomain: "sosiologi-scanner.firebaseapp.com",
  databaseURL: "https://sosiologi-scanner-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sosiologi-scanner",
  storageBucket: "sosiologi-scanner.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let groups = {}, newsArray = [];

// Warna-warni Sticky Note agar tidak membosankan
const noteColors = ['#fbf579', '#ff9eaa', '#85e3ff', '#b9fbc0'];

// Render Sticky Note Logic
onChildAdded(ref(db, 'news'), snap => {
  const data = snap.val();
  
  // --- 1. Masukkan ke Live Ticker ---
  const ticker = document.getElementById('ticker-content');
  if(newsArray.length === 0) ticker.innerHTML = ''; 
  newsArray.push(data);
  
  const newsHtml = `
    <div class="news-item">
      <span>[Kel. ${data.group}] "${data.title}"</span>
      <span class="news-tag">${data.kategori}</span>
      <span style="color:var(--yellow); font-size:24px; margin-left:20px;">•</span>
    </div>
  `;
  ticker.innerHTML += newsHtml;

  // --- 2. Buat Sticky Note di Papan ---
  const stage = document.getElementById('sticky-stage');
  const maxW = stage.clientWidth - 240; 
  const maxH = stage.clientHeight - 240;
  
  // Posisi dan Rotasi Acak
  const randomX = Math.max(20, Math.floor(Math.random() * maxW));
  const randomY = Math.max(20, Math.floor(Math.random() * maxH));
  const randomRot = Math.floor(Math.random() * 16) - 8; // rotasi antara -8 sampai 8 derajat
  const randomColor = noteColors[Math.floor(Math.random() * noteColors.length)];
  
  const sifatClass = data.sifat === 'Negatif' ? 'negatif' : 'positif';

  const note = document.createElement('div');
  note.className = 'sticky-note';
  note.style.left = `${randomX}px`;
  note.style.top = `${randomY}px`;
  note.style.transform = `rotate(${randomRot}deg)`;
  note.style.background = randomColor;
  
  note.innerHTML = `
    <div class="sn-pin"></div>
    <div class="sn-cat">${data.bg} ${data.kategori}</div>
    <div class="sn-title">${data.title}</div>
    <div class="sn-footer">
      <span>T${data.group}</span>
      <span class="sn-sifat ${sifatClass}">${data.sifat}</span>
    </div>
  `;
  
  stage.appendChild(note);
});

// Indikator Kesiapan Kelompok
onValue(ref(db,'groups'), snap => {
  groups = snap.val()||{};
  [1,2,3].forEach(n => document.getElementById('gd-'+n).classList.toggle('active', !!groups[n]));
});

// Fitur Fullscreen
window.toggleFullScreen = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      alert(`Error Fullscreen: ${err.message}`);
    });
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
};

window.resetAll = async () => {
  if(!confirm('Bersihkan semua Sticky Notes di papan?')) return;
  await remove(ref(db,'votes')); await remove(ref(db,'groups')); await remove(ref(db,'news'));
  location.reload();
};
</script>
</body>
</html>
