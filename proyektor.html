<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosiologi Scanner — Layar Utama</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FFFBF0; --yellow: #FFD93D; --orange: #FF6B35; --green: #06D6A0;
  --text: #1a1a2e; --muted: #7777aa; --white: #ffffff;
}
body {
  background-color: var(--bg);
  background-image: radial-gradient(var(--muted) 1px, transparent 1px);
  background-size: 30px 30px; color: var(--text); font-family: 'Nunito Sans', sans-serif;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 3px solid rgba(26,26,46,0.1);
  background: rgba(255,255,255,0.9); z-index: 10;
}
.header-logo {
  background: var(--orange); border: 2px solid var(--text); border-radius: 12px;
  padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900;
  color: white; box-shadow: 2px 2px 0 var(--text);
}
.header-title { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; }

.main { flex: 1; display: flex; position: relative; overflow: hidden; padding-bottom: 50px; }
.bubble-stage { flex: 1; position: relative; }

.sidebar {
  width: 280px; border-left: 3px solid rgba(26,26,46,0.1); padding: 20px 16px;
  background: rgba(255,255,255,0.8); z-index: 5; display: flex; flex-direction: column;
}
.sidebar-title { font-family: 'Nunito', sans-serif; font-weight: 900; margin-bottom: 12px; }

/* NEWS TICKER */
.ticker-wrap {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
  background: var(--text); color: white; display: flex; align-items: center;
  overflow: hidden; border-top: 3px solid var(--yellow); z-index: 20;
}
.ticker-label {
  background: var(--orange); height: 100%; padding: 0 20px;
  display: flex; align-items: center; font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 16px; z-index: 2; border-right: 3px solid white;
}
.ticker-content { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
@keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
.news-item { margin-right: 50px; font-size: 18px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; }
.news-tag { background: var(--yellow); color: var(--text); padding: 2px 8px; border-radius: 8px; font-size: 14px; font-weight: 900; }
.news-func { background: var(--green); color: var(--text); padding: 2px 8px; border-radius: 8px; font-size: 14px; font-weight: 900; }

.bubble {
  position: absolute; border-radius: 50%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; border: 4px solid var(--text);
  transition: all 1s cubic-bezier(0.34,1.2,0.64,1); box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
  animation: float 5s ease-in-out infinite; background: white;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.group-indicators { margin-top: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.group-chip {
  text-align: center; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 900;
  padding: 8px; border-radius: 8px; border: 2px solid rgba(0,0,0,0.1); color: var(--muted);
}
.group-chip.active { background: var(--green); color: var(--text); border-color: var(--text); }

.reset-btn { position: fixed; top: 80px; left: 16px; font-size: 12px; padding: 6px 12px; cursor: pointer; z-index: 100;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🔬 Sos-Scanner</div>
  <div class="header-title">Peta Gejala Sosial Kelas (Fase E)</div>
</div>

<button class="reset-btn" onclick="resetAll()">🔄 Reset Data</button>

<div class="main">
  <div class="bubble-stage" id="bubble-stage"></div>
  <div class="sidebar">
    <div class="sidebar-title">🏆 Top Gejala Sosial</div>
    <div id="bar-list"></div>
    <div class="group-indicators" id="group-indicators">
      <div class="group-chip" id="gd-1">Kel. 1</div>
      <div class="group-chip" id="gd-2">Kel. 2</div>
      <div class="group-chip" id="gd-3">Kel. 3</div>
    </div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">🔴 LIVE NEWS</div>
  <div class="ticker-content" id="ticker-content">
    <div class="news-item">Menunggu observasi dari siswa...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, onChildAdded, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAmeoRLm2qq48uSv9CbML7RB5abKakn73I",
  authDomain: "sosiologi-scanner.firebaseapp.com",
  databaseURL: "https://sosiologi-scanner-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sosiologi-scanner",
  storageBucket: "sosiologi-scanner.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATEGORIES = [
  { id: 'kemiskinan', label: 'Kemiskinan', icon: '🏚️', border: '#FF6B35' },
  { id: 'konflik', label: 'Konflik Sosial', icon: '⚡', border: '#FF4444' },
  { id: 'budaya', label: 'Budaya', icon: '🎭', border: '#9B5DE5' },
  { id: 'pendidikan', label: 'Pendidikan', icon: '📚', border: '#06D6A0' },
  { id: 'lingkungan', label: 'Lingkungan', icon: '🌿', border: '#4CAF50' },
  { id: 'teknologi', label: 'Teknologi', icon: '📱', border: '#4CC9F0' },
  { id: 'gender', label: 'Gender', icon: '⚖️', border: '#FF6B9D' },
  { id: 'kriminal', label: 'Kriminalitas', icon: '🔍', border: '#F9A826' },
];

let votes = {}, groups = {}, positions = {}, newsArray = [];

// Bubble Logic
function renderBubbles() {
  const stage = document.getElementById('bubble-stage');
  const W = stage.offsetWidth, H = stage.offsetHeight;
  const ids = CATEGORIES.map(c=>c.id).filter(id=>(votes[id]||0)>0);
  
  if (!ids.length) return;
  const total = ids.reduce((s,id) => s+(votes[id]||0), 0) || 1;
  const MAX_R = Math.min(W,H) * 0.22, MIN_R = 60;
  
  ids.forEach((id, index) => {
    const cat = CATEGORIES.find(c=>c.id===id);
    const v = votes[id]||0;
    const r = Math.round(MIN_R + (MAX_R-MIN_R) * Math.sqrt(v/total));
    
    // Simple positioning
    let x = (W / (ids.length + 1)) * (index + 1);
    let y = H / 2 + (index % 2 === 0 ? -30 : 30);

    let el = document.getElementById('bubble-'+id);
    if (!el) {
      el = document.createElement('div');
      el.id = 'bubble-'+id; el.className = 'bubble';
      stage.appendChild(el);
    }

    el.style.width = `${r*2}px`; el.style.height = `${r*2}px`;
    el.style.left = `${x-r}px`; el.style.top = `${y-r}px`;
    el.style.borderColor = cat.border;
    
    el.innerHTML = `
      <div style="font-size:${r*0.5}px;line-height:1;">${cat.icon}</div>
      <div style="font-family:'Nunito',sans;font-size:${r*0.2}px;font-weight:900;">${cat.label}</div>
      <div style="font-family:'Nunito',sans;font-size:${r*0.25}px;font-weight:900;color:${cat.border};">${v}</div>
    `;
  });
}

// News Ticker Logic
onChildAdded(ref(db, 'news'), snap => {
  const data = snap.val();
  const ticker = document.getElementById('ticker-content');
  if(newsArray.length === 0) ticker.innerHTML = ''; // Hapus teks menunggu
  newsArray.push(data);
  
  const newsHtml = `
    <div class="news-item">
      <span>[Kel. ${data.group}] "${data.title}"</span>
      <span class="news-tag">${data.kategori}</span>
      <span class="news-func">Pendekatan: ${data.fungsi}</span>
    </div>
  `;
  ticker.innerHTML += newsHtml;
});

onValue(ref(db,'votes'), snap => { votes = snap.val()||{}; renderBubbles(); });
onValue(ref(db,'groups'), snap => {
  groups = snap.val()||{};
  [1,2,3].forEach(n => document.getElementById('gd-'+n).classList.toggle('active', !!groups[n]));
});

window.resetAll = async () => {
  if(!confirm('Reset semua data?')) return;
  await remove(ref(db,'votes')); await remove(ref(db,'groups')); await remove(ref(db,'news'));
  location.reload();
};
</script>
</body>
</html>
